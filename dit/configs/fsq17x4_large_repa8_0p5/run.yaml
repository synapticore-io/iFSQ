# we recommend to read config_details.yaml first.


ckpt_path: 'output_dir/fsq17x4_large_repa8_0p5/checkpoints/0000010.pt' # <----  your own checkpoint, not for training

data:
  raw_data_dir: '/datasets/OpenDataLab___ImageNet-1K/raw/ImageNet-1K/train' # <---- path to your data. it is generated by extract_features.py.
                                 #       if you just want to inference, download our latent_stats.pt and give its path here is ok.
  fid_reference_file: '/checkpoints/VIRTUAL_imagenet256_labeled.npz' # <---- path to your fid_reference_file.npz. download it from ADM
  offline_features: false
  # recommend to use default settings
  image_size: 256
  num_classes: 1000
  num_workers: 16
  latent_norm: false
  latent_multiplier: 1.092421

# recommend to use default settings (we wil release codes with SD-VAE later)
vae:
  vae_type: 'fsq'
  config_path: "/T1/ifsq/results/ifsq_f16_d4_4bit/config.json"
  model_path: '/T1/ifsq/results/ifsq_f16_d4_4bit/checkpoint-10.ckpt'
  downsample_ratio: 16

# recommend to use default settings
model:
  model_type: DiT-L/1
  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  in_chans: 4
  use_checkpoint: false

repa:
  use_repa: true
  enc_type: dinov2-vit-b
  encoder_depth: 8
  proj_coef: 0.5
  
# recommend to use default settings
train:
  max_steps: 100000
  global_batch_size: 1024
  global_seed: 0
  output_dir: 'output_dir/fsq17x4_large_repa8_0p5'
  ckpt: null
  log_every: 100
  ckpt_every: 10000
  eval_every: 10000
  wandb: true
  seed: 1234
  precision: 'bf16'
optimizer:
  lr: 0.0002
  beta2: 0.95
wandb:
  proj_name: 'ifsq_dit_repa'
  log_name: 'fsq17x4_large_repa8_0p5'
  key: '953e958793b218efb850fa194e85843e2c3bd88b'

scheduler:
  diffusion: false
  transport: true

diffusion: 
  learn_sigma: true
  diffusion_steps: 1000

# recommend to use default settings
transport:
  path_type: Linear
  prediction: velocity
  loss_weight: null
  sample_eps: null
  train_eps: null
  use_cosine_loss: true
  use_lognorm: true

# recommend to use default settings
sample:
  mode: ODE
  sampling_method: euler
  atol: 0.000001
  rtol: 0.001
  reverse: false
  likelihood: false
  num_sampling_steps: [250]
  cfg_scale: 1.0
  # recommend to use default settings
  per_proc_batch_size: 64
  fid_num: 50000
  cfg_interval_start: 0.0
  timestep_shift: 0.0