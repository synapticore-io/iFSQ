
ckpt_path: 'output_dir/large_repa_d8_2p0/checkpoints/0000010.pt' # <---- download our pre-trained dit or your own checkpoint

data:
  data_path: '/datasets/OpenDataLab___ImageNet-1K/raw/ImageNet-1K/train' # <---- path to your data. it is generated by extract_features.py.
  offline_features: false
  fid_reference_file: '/checkpoints/VIRTUAL_imagenet256_labeled.npz' # <---- path to your fid_reference_file.npz. download it from ADM
  image_size: 256
  num_classes: 1000
  num_workers: 16

vqvae:
  vq_model: 'VQ-16'
  model_path: '/checkpoints/vq_ds16_c2i.pt'
  codebook_size: 16384
  codebook_embed_dim: 8
  downsample_ratio: 16

model:
  model_type: LlamaGen-L
  drop_path_rate: 0.0
  dropout_p: 0.1
  token_dropout_p: 0.1
  use_checkpoint: false

repa:
  use_repa: true
  enc_type: dinov2-vit-b
  encoder_depth: 8
  proj_coef: 2.0

train:
  epochs: 100
  global_batch_size: 256
  global_seed: 0
  output_dir: 'output_dir/large_repa_d8_2p0'
  ckpt: null
  log_every: 100
  ckpt_every: 25000
  eval_every: 25000
  wandb: true
  seed: 1234
  precision: 'bf16'

optimizer:
  lr: 0.0001
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.05
  max_grad_norm: 1.0

wandb:
  proj_name: 'llamagen'
  log_name: 'large_repa_d8_2p0'
  key: '953e958793b218efb850fa194e85843e2c3bd88b'

sample:
  image_size: 256
  top_k: 0
  top_p: 1.0
  temperature: 1.0
  cfg_interval: -1
  cfg_scale: 2.0
  per_proc_batch_size: 64
  fid_num: 50000
  eval_cknna: true